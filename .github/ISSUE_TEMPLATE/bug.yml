name: 'Bug 이슈 등록'
description: 'fix 관련 이슈를 생성'
labels: ['fix']
title: '[fix] 버그 제목'
body:
  - type: markdown
    attributes:
      value: |
        버그 리포트를 위한 이슈를 작성해주세요.

  - type: textarea
    id: description
    attributes:
      label: '버그 내용(Description)'
      description: '버그에 대해서 설명해주세요'
      placeholder: 어떤 버그인가요?
    validations:
      required: true

  - type: textarea
    id: situation
    attributes:
      label: '재현 상황(Situation)'
      description: '버그 발생 상황에 대해서 단계별로 설명해주세요'
      placeholder: |
        1. Step 1
        2. Step 2
        2. Step 3
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: 추가 정보
      description: 스크린샷, 참고 자료, 관련 링크 등을 첨부해주세요.
      placeholder: 추가적인 정보가 있다면 여기에 작성해주세요.
    validations:
      required: false
