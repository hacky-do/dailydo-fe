name: '기능 추가 이슈 등록'
description: 'feature 관련 이슈를 생성'
labels: ['feature']
title: '[feature] 기능 제목'
body:
  - type: markdown
    attributes:
      value: |
        새로운 기능 추가를 위한 이슈를 작성해주세요.

  - type: textarea
    id: description
    attributes:
      label: '기능 설명(Description)'
      description: 추가하고자 하는 기능에 대해 자세히 설명해주세요.
      placeholder: 어떤 기능을 추가하고 싶으신가요?
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: '수용 조건(Acceptance Criteria)'
      description: 이 기능이 완료되었다고 판단할 수 있는 조건들을 나열해주세요.
      placeholder: |
        - [ ] 조건 1
        - [ ] 조건 2
        - [ ] 조건 3
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: 추가 정보
      description: 스크린샷, 참고 자료, 관련 링크 등을 첨부해주세요.
      placeholder: 추가적인 정보가 있다면 여기에 작성해주세요.
    validations:
      required: false
